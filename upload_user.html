    *{
        color: whitesmoke;
        
        background: #2f2f2f;
    }
        body {
            color: whitesmoke;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
            background: #2f2f2f;
            width: calc(100% - 33px);
        }

        canvas {
            position: absolute;
        }

        #containerr {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .result-container {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .result-container>div {
            font-size: 1.3rem;
            padding: 0.5rem;
            margin: 5px 0;
            color: white;
            text-transform: capitalize;
        }

        video {
            width: 100%;
            -o-transform : scaleX(-1);
            -moz-transform : scaleX(-1);
            -webkit-transform : scaleX(-1);
            -ms-transform: scaleX(-1);
            transform : scaleX(-1);
        }

        header {
            background: #42a5f5;
            color: white;
            width: 100%;
            font-size: 2rem;
            padding: 1rem;
            font-size: 2rem;
        }
        .img-container{
            max-height: 50vh;
            overflow :scroll;
        }
        #img {
        max-height: 50%;
        overflow: auto;
        display:grid;
        grid-template-columns: 1fr auto;
        grid-gap: 15px;
        }

        image{
            object-fit: cover;
        }
