<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload user images</title>

    <!-- Bootstrap imports -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>


    <!-- JS imports  -->
    <script defer src="face-api.min.js"></script>
    <script defer src="upload_user.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

</head>

<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        height: 100vh;
    }

    .main-container {
        height: 20vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: row;
    }

    .video-container {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    canvas {
        position: relative;
       
    }
    .input-container{
        display: flex;
        justify-content: center;
        align-items: center ;
    }
    video {
        margin-top: 20%;
        position: absolute;
    }

    .img-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
</style>

<body>
    <div class="container input-container">
        <label for="user_id">Enter your ID</label>
        <input class="form-control" type="text" id="user_id" required />
    </div>
    <div class="main-container">
        <button id="snapbtn" class="btn btn-success">
            Take a Snap
        </button>
        <button id="uploadbtn" class="btn btn-danger btn-disabled">
            Upload all images
        </button>
    </div>

    <div class="video-container">
        <video id="video" width="720" height="560" autoplay muted></video>
    </div>
    <div class="img-container">
        <!-- All display images go here -->

    </div>
</body>

</html>
