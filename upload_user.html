    *{
        color: whitesmoke;
        
        background: #2f2f2f;
    }
        body {
            color: whitesmoke;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
            background: #2f2f2f;
            width: calc(100% - 33px);
        }

        canvas {
            position: absolute;
        }

        #containerr {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .result-container {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .result-container>div {
            font-size: 1.3rem;
            padding: 0.5rem;
            margin: 5px 0;
            color: white;
            text-transform: capitalize;
        }

        video {
            width: 100%;
        }

        header {
            background: #42a5f5;
            color: white;
            width: 100%;
            font-size: 2rem;
            padding: 1rem;
            font-size: 2rem;
        }
        .img-container{
            max-height: 50vh;
            overflow :scroll;
        }
        #img {
        max-height: 50%;
        overflow: auto;
        display:grid;
        grid-template-columns: 1fr auto;
        grid-gap: 15px;
        }

        image{
            object-fit: cover;
        }
   
    </style>
</head>

<body>
    <div class="container input-container">
        <label for="user_id">Enter your ID</label>
        <input class="form-control" type="text" id="user_id" required />
        <span> Please enter valid user id</span>
    </div>
    <div id="containerr">
        <video id="vid" height="500" width="500" autoplay muted></video>
    </div>
    <div class="result-container ">
        <!-- <img src="" id="pic" width="720" height="560" alt=""> -->
        <div class="panel img-container">
            <!-- All display images go here -->
            <div id="img">
                
            </div>
        </div>
        <div class="panel">
            <div class="main-container panel-body">
                <button id="uploadbtn"  onclick="postImage()" class="btn btn-danger">
                    Upload all images
                </button>
                <div id="notify" class="alert alert-success" style="display: none; color: teal;">

                </div>
                <div id="notify_fail" class="alert alert-failure" style="display: none; color: white;">

                </div>
            </div>
        </div>
    </div>
</body>
