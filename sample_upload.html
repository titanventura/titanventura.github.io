<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample upload</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>

<style>
    canvas {
        position: absolute;
    }
</style>

<body>
    <img src="./image_1.jpg" id="myimg" alt="">
</body>

<script>
    // step 1 : get blob from image

    function blob_from_img() {
        const image = document.getElementById("myimg");
        console.log(image);
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        console.log("context created");
        console.log(context);
        context.drawImage(image, 0, 0, image.width, image.height);
        const blob = canvas.toDataURL("image/png");
        console.log(blob);
        return blob;
    }
    // blog_from_img();

    // step 2 : post blob to server (AWS)
    async function postImage(blob) {
        const form_data = new FormData();
        const myHeaders = new Headers();
        myHeaders.append("Authorization", "Basic c3JpbmF0aDpzcm50aHNyZGhybg==");
        myHeaders.append("Content-Type", "multipart/form-data;");
        // myHeaders.append("Access-Control-Allow-Origin","true");  
        // myHeaders.append("Accept","*/*");        
        // myHeaders.append("Access-Control-Allow-Credentials","true");        
        // myHeaders.append("Accept-Encoding","gzip, deflate, br");        
        // myHeaders.append("mode","no-cors");
        form_data.append("image_1", blob);

        var requestOptions = {
            method: 'POST',
            headers: myHeaders,
            body: form_data,
            redirect: 'follow'
        };
        const response = await fetch("http://Heimdall-280442718.ap-south-1.elb.amazonaws.com/predict_user/",requestOptions)
        
        const result = await response.text();
        console.log(result);
    }


    postImage(blob_from_img());

    // we'll run ?yes
</script>

</html>
